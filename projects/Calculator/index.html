<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <h1 class="title">Professional Calculator</h1>
        <div class="calculator">
            <input type="text" class="calculator-screen" disabled>

            <div class="calculator-keys">
                <button class="key key-clear">C</button>
                <button class="key key-operator">%</button>
                <button class="key key-operator">M+</button>
                <button class="key key-operator">M-</button>

                <button class="key">7</button>
                <button class="key">8</button>
                <button class="key">9</button>
                <button class="key key-operator">*</button>

                <button class="key">4</button>
                <button class="key">5</button>
                <button class="key">6</button>
                <button class="key key-operator">/</button>

                <button class="key">1</button>
                <button class="key">2</button>
                <button class="key">3</button>
                <button class="key key-operator">+</button>

                <button class="key">0</button>
                <button class="key">.</button>
                <button class="key key-equal">=</button>
                <button class="key key-operator">-</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
